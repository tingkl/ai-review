title: "空指针/None 引用"
summary: "未检查空值就直接使用对象属性或方法"
severity: 7
level: "error"
category: "bug"
tags: ["空指针", "NPE", "判空"]

why: |
  对象可能为 None/null 时，直接访问属性或调用方法会抛出异常，
  导致程序崩溃。

impact: |
  - 程序运行时崩溃
  - 用户体验差（500 错误）
  - 可能丢失未保存的数据

languages: ["python", "java", "javascript", "go"]

bad_examples:
  - label: "直接访问可能为 None 的属性"
    code: |
      name = user.name  # user 可能为 None

  - label: "直接访问可能为空的列表"
    code: |
      first = items[0]  # items 可能为空

good_examples:
  - label: "判空后使用"
    code: |
      name = user.name if user else "anonymous"

  - label: "检查列表长度"
    code: |
      first = items[0] if items else None

check_points:
  - question: "使用对象前是否检查了 None/null？"
    hint: "关注函数返回值、数据库查询结果"
  - question: "列表/字典索引前是否检查了长度？"
    hint: "访问 [0] 前确认列表非空"
