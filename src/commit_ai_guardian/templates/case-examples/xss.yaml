title: "XSS 跨站脚本攻击"
summary: "用户输入未经转义直接输出到 HTML 页面"
severity: 9
level: "critical"
category: "security"
tags: ["XSS", "HTML", "前端"]

why: |
  攻击者可以注入恶意脚本，当其他用户浏览页面时执行，
  窃取 Cookie、伪造请求等。

impact: |
  - 用户 Cookie 被盗，账号被劫持
  - 页面内容被篡改
  - 钓鱼攻击

references:
  - "https://owasp.org/www-community/attacks/xss/"

languages: ["javascript", "python", "java", "php"]
applies_to:
  - "**/views/**/*.py"
  - "**/templates/**/*.html"

bad_examples:
  - label: "innerHTML 插入用户输入"
    code: |
      element.innerHTML = userInput;

good_examples:
  - label: "textContent 代替 innerHTML"
    code: |
      element.textContent = userInput;

check_points:
  - question: "innerHTML、document.write 是否插入用户输入？"
    hint: "搜索 innerHTML = 和 document.write"
  - question: "模板渲染是否使用了 |safe 或类似标记？"
    hint: "检查是否绕过自动转义"
