title: "硬编码密码/密钥"
summary: "密码、API Key、密钥等敏感信息直接写在代码中"
severity: 9
level: "critical"
category: "security"
tags: ["密码", "密钥", "配置"]

why: |
  代码会被提交到 Git 仓库，所有有权限的人都能看到。
  一旦泄露，攻击者可以直接使用这些凭证访问系统。

impact: |
  - 生产环境凭证泄露
  - 数据库/第三方服务被非法访问
  - 数据被窃取或篡改

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"

languages: ["python", "java", "javascript", "go", "rust", "php"]

bad_examples:
  - label: "明文密码"
    code: |
      DB_PASSWORD = "MyP@ssw0rd123"
      API_KEY = "sk-abc123xyz789"

good_examples:
  - label: "环境变量"
    code: |
      DB_PASSWORD = os.environ.get("DB_PASSWORD")
      API_KEY = os.environ.get("API_KEY")

check_points:
  - question: "代码中是否有明文密码、token、密钥？"
    hint: "搜索 password、secret、token、key 等关键词"
  - question: "是否使用了环境变量或配置中心？"
    hint: "生产环境配置应该与代码分离"
