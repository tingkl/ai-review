title: "硬编码密码/密钥"
description: "密码、API Key、密钥等敏感信息直接写在代码中"
severity: "critical"
category: "security"
languages: ["python", "java", "javascript", "go", "rust", "php"]
bad_example: |
  # 危险：密码写死在代码里
  DB_PASSWORD = "MyP@ssw0rd123"
  API_KEY = "sk-abc123xyz789"
good_example: |
  # 安全：从环境变量读取
  DB_PASSWORD = os.environ.get("DB_PASSWORD")
  API_KEY = os.environ.get("API_KEY")
check_points:
  - "代码中是否有明文密码、token、密钥"
  - "是否使用了环境变量或配置中心"
  - "测试代码中的 mock 密码是否标记了 TODO"
