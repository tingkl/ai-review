title: "SQL 注入"
summary: "用户输入直接拼接到 SQL 语句中"
severity: 9
level: "critical"
category: "security"
tags: ["SQL", "注入", "数据库"]

why: |
  攻击者可以通过构造特殊的输入来改变 SQL 语句的语义，
  从而绕过认证、读取敏感数据、甚至删除数据库。

impact: |
  - 数据泄露（用户信息、密码、交易记录）
  - 数据被篡改或删除
  - 系统被完全控制

references:
  - "https://owasp.org/www-community/attacks/SQL_Injection"

languages: ["python", "java", "javascript", "go", "php"]
applies_to:
  - "**/*repository*"
  - "**/db/**/*.py"

bad_examples:
  - label: "f-string 拼接"
    code: |
      query = f"SELECT * FROM users WHERE id = {user_id}"
      cursor.execute(query)

  - label: "format 方法"
    code: |
      query = "SELECT * FROM users WHERE id = {}".format(user_id)
      cursor.execute(query)

good_examples:
  - label: "参数化查询（推荐）"
    code: |
      cursor.execute("SELECT * FROM users WHERE id = ?", (user_id,))

  - label: "ORM 方式"
    code: |
      User.objects.filter(id=user_id).first()

check_points:
  - question: "是否有字符串拼接构建 SQL？"
    hint: "搜索 +、format、f-string、% 拼接 SQL 的地方"
  - question: "是否使用了参数化查询？"
    hint: "确认 execute() 的第二个参数传了元组/列表"
  - question: "ORM 的 raw() / execute() 是否传了用户输入？"
    hint: "检查 Django ORM 的 .raw()、SQLAlchemy 的 .execute()"
